<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPEC / IIS 자동 요약</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root{
    --bg:#0f1419; --card:#1a2029; --card2:#222a35; --line:#2e3743;
    --txt:#e6ebf1; --sub:#9aa7b5; --accent:#4a9eff; --accent2:#2d7dd2;
    --spec:#4a9eff; --iis:#2ec19b; --warn:#ffb454; --bad:#ff6b6b; --good:#2ec19b;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.55}
  .wrap{max-width:960px;margin:0 auto;padding:24px 18px 80px}
  h1{font-size:22px;margin:0 0 4px;font-weight:700}
  .subtitle{color:var(--sub);font-size:13px;margin-bottom:20px}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tab{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--sub);cursor:pointer;text-align:center;
    font-weight:600;font-size:15px;transition:.15s;user-select:none}
  .tab.active[data-cat="spec"]{background:var(--spec);color:#04101f;border-color:var(--spec)}
  .tab.active[data-cat="iis"]{background:var(--iis);color:#042018;border-color:var(--iis)}
  .searchbox{position:relative;margin-bottom:14px}
  .searchrow{display:flex;gap:8px}
  input[type=text]{flex:1;padding:13px 14px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--txt);font-size:15px;outline:none}
  input[type=text]:focus{border-color:var(--accent)}
  .btn{padding:0 20px;border-radius:10px;border:none;background:var(--accent);
    color:#04101f;font-weight:700;font-size:15px;cursor:pointer}
  .btn:disabled{opacity:.5;cursor:default}
  .ac{position:absolute;top:52px;left:0;right:0;background:var(--card2);
    border:1px solid var(--line);border-radius:10px;max-height:320px;overflow:auto;
    z-index:20;display:none;box-shadow:0 8px 30px rgba(0,0,0,.4)}
  .ac.show{display:block}
  .ac-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--line);font-size:14px}
  .ac-item:last-child{border-bottom:none}
  .ac-item:hover,.ac-item.sel{background:var(--accent2);color:#fff}
  .ac-item .m{font-weight:700}
  .ac-item .meta{color:var(--sub);font-size:12px;margin-left:6px}
  .ac-item:hover .meta,.ac-item.sel .meta{color:#dbe9ff}
  .badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:11px;
    font-weight:700;margin-left:6px;vertical-align:middle}
  .b-grade{background:#3a2e15;color:var(--warn)}
  .b-series{background:#153a2e;color:var(--iis)}
  .status{color:var(--sub);font-size:13px;padding:8px 2px;min-height:20px}
  .result{margin-top:10px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:20px;margin-bottom:16px}
  .card h2{margin:0 0 4px;font-size:19px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .filemeta{color:var(--sub);font-size:12px;margin-bottom:16px;word-break:break-all}
  .kv{display:grid;grid-template-columns:180px 1fr;gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .kv .k,.kv .v{background:var(--card2);padding:9px 12px;font-size:13.5px}
  .kv .k{color:var(--sub);font-weight:600}
  .kv .v{color:var(--txt)}
  .kv .v.hl{color:var(--warn);font-weight:700}
  .kv .v.crit{color:var(--bad);font-weight:700}
  .sec-title{font-size:14px;font-weight:700;color:var(--accent);margin:20px 0 8px;
    text-transform:uppercase;letter-spacing:.5px}
  .iis .sec-title{color:var(--iis)}
  details{margin-top:16px;background:var(--card2);border:1px solid var(--line);border-radius:10px}
  summary{padding:11px 14px;cursor:pointer;font-size:13px;color:var(--sub);font-weight:600}
  .rawtext{padding:0 14px 14px;font-size:12px;white-space:pre-wrap;color:#b8c2cd;
    max-height:420px;overflow:auto;font-family:ui-monospace,monospace}
  .openpdf{display:inline-block;margin-top:14px;padding:9px 16px;border-radius:8px;
    background:var(--card2);border:1px solid var(--line);color:var(--accent);
    text-decoration:none;font-size:13px;font-weight:600}
  .empty{color:var(--sub);text-align:center;padding:40px 20px;font-size:14px}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--line);
    border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;
    vertical-align:middle;margin-right:6px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .cfg{background:#2a1a1a;border:1px solid #4a2a2a;color:#ffb4b4;padding:14px;
    border-radius:10px;font-size:13px;margin-bottom:16px;display:none}
  .cfg.show{display:block}
  .cfg input{margin-top:8px;width:100%}
  .note{font-size:11px;color:var(--sub);margin-top:6px}
  a{color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <h1>SPEC / IIS 자동 요약</h1>
  <div class="subtitle">모델명을 입력하고 선택하면 PDF를 읽어 핵심 내용을 자동 요약합니다. · 정림전자 품질팀</div>

  <div class="cfg" id="cfg">
    <b>저장소를 찾을 수 없습니다.</b> GitHub 사용자명과 저장소명을 입력하세요.
    <input type="text" id="cfgUser" placeholder="GitHub 사용자명 (예: junglim)">
    <input type="text" id="cfgRepo" placeholder="저장소명 (예: spec-iis)">
    <input type="text" id="cfgBranch" placeholder="브랜치 (기본: main)">
    <div class="note">한 번 입력하면 브라우저에 저장됩니다. URL에 <code>?owner=사용자&repo=저장소</code>를 붙여도 됩니다.</div>
  </div>

  <div class="tabs">
    <div class="tab active" data-cat="spec">SPEC (제품 사양)</div>
    <div class="tab" data-cat="iis">IIS (검토 기준)</div>
  </div>

  <div class="searchbox">
    <div class="searchrow">
      <input type="text" id="q" placeholder="모델명 입력 (예: P215HAN, M270QAN06, G215)" autocomplete="off">
      <button class="btn" id="go">검색</button>
    </div>
    <div class="ac" id="ac"></div>
  </div>

  <div class="status" id="status"></div>
  <div class="result" id="result">
    <div class="empty">모델명을 입력해 목록에서 선택한 뒤 <b>검색</b>을 누르세요.</div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

/* ---------- 저장소 자동 감지 ---------- */
function detectRepo(){
  const p = new URLSearchParams(location.search);
  let owner = p.get("owner"), repo = p.get("repo"), branch = p.get("branch");
  const ls = (k)=>{try{return localStorage.getItem(k)}catch(e){return null}};
  owner = owner || ls("gh_owner");
  repo  = repo  || ls("gh_repo");
  branch= branch|| ls("gh_branch");
  // github.io 자동감지: username.github.io/repo/...
  if((!owner||!repo) && location.hostname.endsWith("github.io")){
    owner = owner || location.hostname.split(".")[0];
    const seg = location.pathname.split("/").filter(Boolean);
    if(seg.length) repo = repo || seg[0];
  }
  branch = branch || "main";
  return {owner, repo, branch};
}
let REPO = detectRepo();

/* ---------- 파일명 파서 ---------- */
function parseModel(fn){
  const U = fn.toUpperCase();
  let m = U.match(/([GMPT]\d{3}[A-Z]{2,4}\d{2})(?:\.(\d+))?/);
  if(m) return {base:m[1], full:m[1]+(m[2]?"."+m[2]:"")};
  m = U.match(/([GMPT]\d{3}[A-Z]{2,4})/);
  if(m) return {base:m[1], full:m[1]};
  m = U.match(/([GMPT]\d{3})/);
  if(m) return {base:m[1], full:m[1]};
  return {base:fn.replace(/\.pdf$/i,""), full:fn.replace(/\.pdf$/i,"")};
}
function parseGrade(fn){
  if(/A\s*\+|\+\s*A|A\s*plus/i.test(fn)) return "A+";
  if(/\bB[\s_]*grade|\(B\b/i.test(fn)) return "B";
  if(/\bN[\s_]*grade/i.test(fn)) return "N";
  if(/[\s_]P[\s_]*grade/i.test(fn)) return "P";
  if(/\bZ[\s_]*grade/i.test(fn)) return "Z";
  if(/\bA[\s_]*grade|_A_|\(A\)/i.test(fn)) return "A";
  return "";
}
function parseSeries(fn){
  const m = fn.match(/(\d00)\s*series|series[\s_]*(\d00)|\((\d00)\s*series\)/i);
  if(m) return (m[1]||m[2]||m[3]);
  return "";
}
function parseDate(fn){
  const m = fn.match(/(20\d{2})[._\-]?(\d{2})[._\-]?(\d{2})/);
  return m ? `${m[1]}.${m[2]}.${m[3]}` : "";
}

/* ---------- 파일 목록 로드 (GitHub API, 실시간) ---------- */
let INDEX = {spec:[], iis:[]};
async function loadIndex(){
  if(!REPO.owner || !REPO.repo){ document.getElementById("cfg").classList.add("show"); return false; }
  const url = `https://api.github.com/repos/${REPO.owner}/${REPO.repo}/git/trees/${REPO.branch}?recursive=1`;
  setStatus(`<span class="spinner"></span>저장소에서 파일 목록을 불러오는 중…`);
  let res;
  try{ res = await fetch(url); }catch(e){ setStatus("네트워크 오류: "+e.message); return false; }
  if(res.status===404){
    setStatus(""); document.getElementById("cfg").classList.add("show");
    setStatus(`저장소 ${REPO.owner}/${REPO.repo} (브랜치 ${REPO.branch}) 를 찾을 수 없습니다. 아래에 다시 입력하세요.`);
    return false;
  }
  if(res.status===403){ setStatus("GitHub API 요청 한도 초과. 잠시 후 다시 시도하세요."); return false; }
  if(!res.ok){ setStatus("파일 목록 로드 실패: HTTP "+res.status); return false; }
  const data = await res.json();
  INDEX = {spec:[], iis:[]};
  for(const it of (data.tree||[])){
    if(it.type!=="blob") continue;
    if(!/\.pdf$/i.test(it.path)) continue;
    const parts = it.path.split("/");
    const top = parts[0].toUpperCase();
    const cat = top==="SPEC"?"spec": top==="IIS"?"iis": null;
    if(!cat) continue;
    const fn = parts[parts.length-1];
    const pm = parseModel(fn);
    INDEX[cat].push({
      model:pm.base, modelFull:pm.full, grade:parseGrade(fn),
      series:parseSeries(fn), date:parseDate(fn), path:it.path, filename:fn
    });
  }
  // 최신 우선 정렬
  for(const c of ["spec","iis"]) INDEX[c].sort((a,b)=> (b.date||"").localeCompare(a.date||""));
  setStatus(`불러오기 완료 · SPEC ${INDEX.spec.length}건 / IIS ${INDEX.iis.length}건`);
  setTimeout(()=>{ if(document.getElementById("result").querySelector(".empty")) setStatus(""); }, 2500);
  return true;
}

/* ---------- UI ---------- */
let curCat="spec", acItems=[], acSel=-1, chosen=null;
const $=id=>document.getElementById(id);
function setStatus(h){ $("status").innerHTML=h; }

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  t.classList.add("active"); curCat=t.dataset.cat; chosen=null;
  $("q").value=""; hideAC(); $("q").placeholder = curCat==="spec"
    ? "모델명 입력 (예: P215HAN, M270QAN06, G215)" : "모델명 입력 (예: P215HAN A+, M270QAN06 100)";
  $("q").focus();
});

function search(term){
  term=term.trim().toUpperCase();
  const list = INDEX[curCat];
  if(!term) return list.slice(0,40);
  const toks = term.split(/\s+/);
  return list.filter(it=>{
    const hay = `${it.modelFull} ${it.model} ${it.grade} ${it.series} ${it.filename}`.toUpperCase();
    return toks.every(t=>hay.includes(t));
  }).slice(0,40);
}
function renderAC(){
  const q=$("q").value;
  acItems=search(q); acSel=-1;
  if(!acItems.length){ hideAC(); return; }
  $("ac").innerHTML = acItems.map((it,i)=>{
    const g = it.grade?`<span class="badge b-grade">${it.grade}</span>`:"";
    const s = it.series?`<span class="badge b-series">${it.series} series</span>`:"";
    const d = it.date?`<span class="meta">${it.date}</span>`:"";
    return `<div class="ac-item" data-i="${i}"><span class="m">${it.modelFull}</span>${g}${s}${d}
      <div class="meta" style="margin:2px 0 0">${it.filename}</div></div>`;
  }).join("");
  $("ac").classList.add("show");
  $("ac").querySelectorAll(".ac-item").forEach(el=>el.onclick=()=>choose(+el.dataset.i));
}
function hideAC(){ $("ac").classList.remove("show"); }
function choose(i){
  chosen=acItems[i]; $("q").value=chosen.modelFull+(chosen.grade?" "+chosen.grade:"")+(chosen.series?" "+chosen.series:"");
  hideAC();
}
$("q").addEventListener("input",()=>{ chosen=null; renderAC(); });
$("q").addEventListener("focus",renderAC);
$("q").addEventListener("keydown",e=>{
  if(!$("ac").classList.contains("show")){ if(e.key==="Enter") run(); return; }
  const items=$("ac").querySelectorAll(".ac-item");
  if(e.key==="ArrowDown"){e.preventDefault();acSel=Math.min(acSel+1,items.length-1);}
  else if(e.key==="ArrowUp"){e.preventDefault();acSel=Math.max(acSel-1,0);}
  else if(e.key==="Enter"){e.preventDefault(); if(acSel>=0)choose(acSel); else if(items.length)choose(0); run(); return;}
  else if(e.key==="Escape"){hideAC();return;}
  else return;
  items.forEach((el,idx)=>el.classList.toggle("sel",idx===acSel));
  if(items[acSel]) items[acSel].scrollIntoView({block:"nearest"});
});
document.addEventListener("click",e=>{ if(!e.target.closest(".searchbox")) hideAC(); });
$("go").onclick=run;

function run(){
  if(!chosen){
    const r=search($("q").value);
    if(r.length){ chosen=r[0]; } else { setStatus("일치하는 모델이 없습니다."); return; }
  }
  hideAC(); summarize(chosen);
}

/* ---------- config 저장 ---------- */
["cfgUser","cfgRepo","cfgBranch"].forEach(id=>{
  $(id)?.addEventListener("change",()=>{
    const u=$("cfgUser").value.trim(), r=$("cfgRepo").value.trim(), b=$("cfgBranch").value.trim()||"main";
    if(u&&r){ try{localStorage.setItem("gh_owner",u);localStorage.setItem("gh_repo",r);localStorage.setItem("gh_branch",b);}catch(e){}
      REPO={owner:u,repo:r,branch:b}; $("cfg").classList.remove("show"); loadIndex(); }
  });
});

/* ---------- PDF 텍스트 추출 ---------- */
async function extractText(path){
  const raw = `https://raw.githubusercontent.com/${REPO.owner}/${REPO.repo}/${REPO.branch}/${path.split("/").map(encodeURIComponent).join("/")}`;
  const pdf = await pdfjsLib.getDocument(raw).promise;
  const pages=[];
  const N=Math.min(pdf.numPages, 12);
  for(let i=1;i<=N;i++){
    const page=await pdf.getPage(i);
    const tc=await page.getTextContent();
    // y좌표로 줄 재구성 (glyph 간 실제 간격이 있을 때만 공백 삽입)
    const rows={};
    for(const it of tc.items){
      if(!it.str) continue;
      const y=Math.round(it.transform[5]);
      (rows[y]=rows[y]||[]).push([it.transform[4], it.str, it.width||0, it.height||10]);
    }
    const lines=Object.keys(rows).map(Number).sort((a,b)=>b-a).map(y=>{
      const items=rows[y].sort((a,b)=>a[0]-b[0]);
      let out="", prevEnd=null;
      for(const [x,s,w,h] of items){
        if(prevEnd!==null){ const gap=x-prevEnd; if(gap>0.3*(h||10)||gap>3) out+=" "; }
        out+=s; prevEnd=x+w;
      }
      return out.replace(/\s+/g," ").trim();
    }).filter(Boolean);
    pages.push(lines);
  }
  return {url:raw, pages};
}

/* ---------- SPEC 요약 ---------- */
const SPEC_FIELDS = [
  ["화면 크기 / 대각선", /Screen\s*Diagonal|Diagonal/i],
  ["Active Area", /Active\s*Area/i],
  ["해상도 (Pixels)", /Pixels?\s*H\s*x?\s*V|Resolution|Number of Pixels/i],
  ["Pixel Pitch", /Pixel\s*Pitch/i],
  ["Display Mode", /Display\s*Mode/i],
  ["휘도 (White Luminance)", /White\s*Luminance|Brightness|Luminance\s*\(Center/i],
  ["명암비 (Contrast)", /Contrast\s*Ratio/i],
  ["응답속도 (Response)", /Response\s*Time/i],
  ["소비전력 (Power)", /Power\s*Consumption/i],
  ["무게 (Weight)", /Weight/i],
  ["외형치수 (Outline)", /Outline\s*Dimension|Outer\s*Dimension/i],
  ["인터페이스", /Electrical\s*Interface|Input\s*Interface|Interface\b/i],
  ["표시색상 (Color)", /Support\s*Color|Display\s*Colors|Number of colors/i],
  ["표면처리 (Surface)", /Surface\s*Treatment/i],
  ["동작온도 (Operating)", /Operating[\s\S]{0,3}\[?o?C|Operating Temperature/i],
];
function valueAfterLabel(line, re){
  // 라벨 뒤쪽 텍스트를 값으로 (단위 [mm] 등은 유지)
  return line.replace(re,"").replace(/^[\s\-:.]*/,"").trim();
}
function summarizeSpec(model, pages){
  const flat=[].concat(...pages);
  const kv=[];
  for(const [label,re] of SPEC_FIELDS){
    const line = flat.find(l=>re.test(l) && l.length<160 && /\d|LVDS|eDP|mode|RGB|Glare|colors/i.test(l));
    if(line){ const v=valueAfterLabel(line,re); if(v && v.length<120) kv.push([label,v]); }
  }
  // General Description 문장
  const desc = flat.find(l=>/This specification applies to|inch wide|TFT-LCD Module/i.test(l) && l.length>40);
  return {kv, desc};
}

/* ---------- IIS 요약 ---------- */
const IIS_FIELDS=[
  ["Line / Block 불량", /Line\s*\/?\s*Block/i, "crit"],
  ["휘점 (Bright dot)", /Bright\s*dots?/i, "crit"],
  ["암점 (Dark dot)", /Dark\s*dots?/i, "hl"],
  ["총 점결함 (Total)", /Total\s*dots?/i, "hl"],
  ["점간 거리 (Distance)", /Distance\s*between/i, ""],
  ["Mura / 불균일", /non-?uniformity|Mura|ND\s*Filter|ND\s*filter/i, ""],
];
function summarizeIis(model, pages){
  const flat=[].concat(...pages);
  const kv=[];
  for(const [label,re,cls] of IIS_FIELDS){
    const line = flat.find(l=>re.test(l) && l.length<170);
    if(line){ let v=line.replace(re,"").replace(/^[\s\-:.]*/,"").trim(); if(!v||v.length<2)v=line; kv.push([label, v.slice(0,140), cls]); }
  }
  // AQL / 샘플링
  const aqlMaj=flat.find(l=>/Major/i.test(l)&&/AQL|1\.0/i.test(l));
  const aqlMin=flat.find(l=>/Minor/i.test(l)&&/AQL|2\.5/i.test(l));
  const samp=flat.find(l=>/MIL-?STD-?105|Sampling\s*level|Level\s*II/i.test(l));
  const meta=[];
  if(samp) meta.push(["샘플링", samp.slice(0,120)]);
  if(aqlMaj) meta.push(["AQL Major", aqlMaj.replace(/.*Major/i,"Major").slice(0,80)]);
  if(aqlMin) meta.push(["AQL Minor", aqlMin.replace(/.*Minor/i,"Minor").slice(0,80)]);
  // 외관 핵심
  const app=flat.filter(l=>/scratch|bubble|polarizer|Glass broken|particle/i.test(l)&&l.length<160).slice(0,6);
  return {kv, meta, app};
}

/* ---------- 렌더 ---------- */
async function summarize(it){
  setStatus(`<span class="spinner"></span>${it.modelFull} ${it.grade||""} PDF를 읽는 중…`);
  $("result").innerHTML="";
  let ext;
  try{ ext=await extractText(it.path); }
  catch(e){ setStatus("PDF 로드 실패: "+e.message+" (파일 접근 권한 또는 경로 확인)"); return; }
  setStatus("");
  const catClass = curCat==="iis"?"iis":"";
  const gradeBadge = it.grade?`<span class="badge b-grade">${it.grade} grade</span>`:"";
  const seriesBadge = it.series?`<span class="badge b-series">${it.series} series</span>`:"";
  let inner="";
  if(curCat==="spec"){
    const s=summarizeSpec(it, ext.pages);
    inner += s.desc?`<div class="filemeta" style="color:var(--txt);font-size:13.5px;margin-bottom:14px">${s.desc}</div>`:"";
    inner += `<div class="sec-title">핵심 사양 (Display Characteristics)</div>`;
    inner += s.kv.length ? kvTable(s.kv) : `<div class="empty">표준 사양표를 자동 인식하지 못했습니다. 아래 원문을 확인하세요.</div>`;
  } else {
    const s=summarizeIis(it, ext.pages);
    inner += `<div class="sec-title">전기적 검사 기준</div>`;
    inner += s.kv.length ? kvTable(s.kv) : `<div class="empty">검사 기준표를 자동 인식하지 못했습니다. 아래 원문을 확인하세요.</div>`;
    if(s.meta.length){ inner += `<div class="sec-title">샘플링 / AQL</div>`+kvTable(s.meta); }
    if(s.app.length){ inner += `<div class="sec-title">외관 검사 (발췌)</div><div class="kv">`+
      s.app.map(l=>`<div class="k" style="grid-column:1/2">·</div><div class="v">${esc(l)}</div>`).join("")+`</div>`; }
  }
  const rawAll = ext.pages.map((p,i)=>`── page ${i+1} ──\n`+p.join("\n")).join("\n\n");
  $("result").innerHTML = `<div class="card ${catClass}">
    <h2>${it.modelFull}${gradeBadge}${seriesBadge}</h2>
    <div class="filemeta">${curCat.toUpperCase()} · ${esc(it.filename)}${it.date?" · "+it.date:""}</div>
    ${inner}
    <a class="openpdf" href="${ext.url}" target="_blank" rel="noopener">원본 PDF 열기 ↗</a>
    <details><summary>추출된 원문 텍스트 보기</summary><div class="rawtext">${esc(rawAll)}</div></details>
  </div>`;
}
function kvTable(rows){
  return `<div class="kv">`+rows.map(r=>{
    const cls=r[2]?` ${r[2]}`:"";
    return `<div class="k">${esc(r[0])}</div><div class="v${cls}">${esc(r[1])}</div>`;
  }).join("")+`</div>`;
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}

/* ---------- 시작 ---------- */
loadIndex();
</script>
</body>
</html>
